services:
  - type: web
    name: careercopilot-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS_STR
        sync: false
    autoDeploy: true
    region: oregon
    plan: free

  - type: worker
    name: career-copilot-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m backend.app.automation.workers.apply_worker
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
    plan: free

  - type: cron
    name: career-copilot-daily-alerts
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m backend.app.telegram_bot.bot --send-daily-alerts
    schedule: "0 8 * * *"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
